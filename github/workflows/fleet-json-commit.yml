name: Fleet JSON build (commit to repo)

on:
  push:
    paths:
      - 'source/**/*.xlsx'
      - 'scripts/convert_excel_to_json.py'
      - '.github/workflows/fleet-json-commit.yml'
  workflow_dispatch:
  schedule:
    - cron: '15 0 * * *'  # daily at 00:15 UTC
  repository_dispatch:
    types: [sharepoint-updated]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl
      - name: Convert Excel -> JSON
        run: |
          python scripts/convert_excel_to_json.py source/"Aircraft Data For Dashboard Fleet Structure.xlsx" public/data
      - name: Commit JSON
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add public/data/*.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: update fleet JSON"
            git push origin HEAD:${{ github.ref_name }}
          fi
